name: Update commit heatmap

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ST_REGISTRY_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install
        env:
          ST_REGISTRY_TOKEN: ${{ secrets.ST_REGISTRY_TOKEN }}

      - name: Generate heatmap SVG
        run: bun run heatmap

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/commit-heatmap.svg
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update commit heatmap [skip ci]"
          git push
